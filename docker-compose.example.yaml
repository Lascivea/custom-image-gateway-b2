services:
  image-api:
    image: lascivea/custom-image-gateway-b2:latest
    container_name: image-api
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      # 单个上传文件最大大小（MB），覆盖 config.yaml 中的 upload-max-size
      - UPLOAD_MAX_SIZE=50
      # 服务端图片处理最大宽度/高度，0 表示不限制，覆盖 config.yaml 中的 image-max-size-*
      - IMAGE_MAX_SIZE_WIDTH=0
      - IMAGE_MAX_SIZE_HEIGHT=0
    volumes:
      - ./config/:/api/config/
      - ./storage/:/api/storage/
    restart: always
    pull_policy: always
