services:
  image-api:
    image: lascivea/custom-image-gateway-b2:latest
    container_name: image-api
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - UPLOAD_MAX_SIZE=50
      - IMAGE_MAX_SIZE_WIDTH=0
      - IMAGE_MAX_SIZE_HEIGHT=0
    volumes:
      - ./config/:/api/config/
      - ./storage/:/api/storage/
    restart: always
    pull_policy: always
